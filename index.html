<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storage System</title>

    <link rel="stylesheet" href="style.css" />
    <script src="service.storage.js" defer></script>
</head>

<!--
1. container
2. grid/table
3. header
4. buttons
5. pagination row
6. dropdowns

padding, padding vs margin, gap
-->

<body>

    <main class="storage-container">
        <h1 class="header">Storage</h1>
        <div class="storage-header">
            <span class="file-title">My files</span>
            <div class="search-container">
                <input type="text" placeholder="Filter by name" class="search-bar">
                <button class="add-button add-new">Add new</button>
            </div>
        </div>

        <table class="file-table">
            <thead>
                <tr>
                    <th class="check"><input type="checkbox" class="checkbox"></th>
                    <th>Name</th>
                    <th>Uploaded Date</th>
                    <th>Sharing</th>
                    <th>Size</th>
                    <th>Actions</th>
                </tr>
            </thead>
        </table>
    </main>

</body>

</html>
