<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storage System</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

</head>

<!--
1. container
2. grid/table
3. header
4. buttons
5. pagination row
6. dropdowns

padding, padding vs margin, gap
-->

<body>

    <main class="storage-container">
        <h1 class="header">Storage</h1>
        <div class="storage-header">
            <b class="file-title">My files</b>
            <div class="search-container">
                <input type="text" placeholder="Filter by name" class="search-bar">
                <button class="add-button add-new">Add new</button>
            </div>
        </div>

        <table class="file-table">
            <thead>
                <tr>
                    <th class="checkbox-th">
                        <input type="checkbox" class="checkbox">
                    </th>
                    <th>Name</th>
                    <th>Uploaded Date</th>
                    <th>Sharing</th>
                    <th>Size</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr class="table-content">
                    <td class="checkbox-th">
                        <input type="checkbox" class="checkbox" checked="True">
                    </td>
                    <td>Folder name</td>
                    <td>Jun 19, 2026</td>
                    <td>Private</td>
                    <td>--</td>
                    <td class="action-content"><img src="assets/more.svg"></td>
                </tr>
            </tbody>
        </table>

        <div class="pagination-container">
            <ul>
                <li><img src="assets/left_forward.svg"></li>
                <li> <img src="assets/left_arrow.svg"></li>
                <li class="number-page"><strong>1</strong> of 1 </li>
                <li><img src="assets/right_arrow.svg"></li>
                <li><img src="assets/right_forward.svg"></li>

            </ul>
        </div>
    </main>

</body>

</html>
