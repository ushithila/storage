<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storage System</title>

    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>

</head>

<!--
1. container
2. grid/table
3. header
4. buttons
5. pagination row
6. dropdowns

padding, padding vs margin, gap
-->

<body>

    <main class="storage-container">
        <h1 class="header">Storage</h1>
        <div class="storage-header">
            <b class="file-title">My files</b>
            <div class="search-container">
                <input type="text" placeholder="Filter by name" class="search-bar">
                <button class="add-button add-new">Add new</button>
            </div>
        </div>

        <table class="file-table">
            <thead>
                <tr>
                    <th class="checkbox-th">
                        <input type="checkbox" class="checkbox">
                    </th>
                    <th>Name</th>
                    <th>Uploaded Date</th>
                    <th>Sharing</th>
                    <th>Size</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr class="table-content">
                    <td class="checkbox-th">
                        <input type="checkbox" class="checkbox" checked="True">
                    </td>
                    <td>Folder name</td>
                    <td>Jun 19, 2026</td>
                    <td>Private</td>
                    <td>--</td>
                    <td class="action-content">
                        <svg width="16" height="16" viewBox="0 0 4 14" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path 
                                d="M1.66667 3.33333C2.58333 3.33333 3.33333 2.58333 3.33333 1.66667C3.33333 0.75 2.58333 0 1.66667 0C0.75 0 0 0.75 0 1.66667C0 2.58333 0.75 3.33333 1.66667 3.33333ZM1.66667 5C0.75 5 0 5.75 0 6.66667C0 7.58333 0.75 8.33333 1.66667 8.33333C2.58333 8.33333 3.33333 7.58333 3.33333 6.66667C3.33333 5.75 2.58333 5 1.66667 5ZM1.66667 10C0.75 10 0 10.75 0 11.6667C0 12.5833 0.75 13.3333 1.66667 13.3333C2.58333 13.3333 3.33333 12.5833 3.33333 11.6667C3.33333 10.75 2.58333 10 1.66667 10Z"
                                fill="#3E5462" />
                        </svg>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="pagination-container">
            <ul>
                <li><img src="assets/left_forward.svg"></li>
                <li> <img src="assets/left_arrow.svg"></li>
                <li class="number-page"> 1 of 1 </li>
                <li><img src="assets/right_arrow.svg"></li>
                <li><img src="assets/right_forward.svg"></li>

            </ul>
        </div>
    </main>

</body>

</html>
